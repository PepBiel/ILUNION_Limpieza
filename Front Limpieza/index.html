<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EXCELENTIA · ILUNION Limpieza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Palette principal basada en Pantone 3005 + 105 + blanco */
    --il-green: #0077c8;      /* Pantone 3005 (acción principal) */
    --il-green-dark: #005a9c; /* contraste para texto y estados */
    --il-green-soft: #e6f2fb; /* superficies suaves */
    --il-green-tint: #f2f8fd; /* fondos muy sutiles */

    --il-yellow: #9b7c00;      /* referencia Pantone 105 */
    --il-yellow-soft: #fff8dc;
    --il-yellow-bright: #ffd100; /* Pantone 109 para destacar elementos */
    --il-yellow-bright-soft: #fff4b3;

    /* Support accents */
    --il-red: #c63b2a;
    --il-red-soft: #fde8e5;
    --il-amber-soft: #fff1a8;
    --il-blue-soft: #e6f2fb;

    /* Neutros para máxima legibilidad en usuarios senior */
    --bg: #f7fbff;
    --ink-1: #0f2233;
    --ink-2: #2f4355;
    --ink-3: #5e7081;
    --line: #d8e3ed;
    --line-strong: #b8c8d6;

    --shadow-sm: 0 1px 2px rgba(11, 34, 52, .05);
    --shadow-md: 0 6px 16px rgba(11, 34, 52, .08);
    --shadow-lg: 0 18px 48px rgba(11, 34, 52, .18);
  }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink-1);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  button { font-family: inherit; }
  input, select { font-family: inherit; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius:5px; border:2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/shared.jsx"></script>
  <script type="text/babel" src="src/view_cuadrante.jsx"></script>
  <script type="text/babel" src="src/views_extra.jsx"></script>
  <script type="text/babel" src="src/chatbot.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
